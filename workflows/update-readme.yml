name: Update Profile README
on:
  schedule:
    - cron: '0 6 * * *' # daily at 6am UTC
  workflow_dispatch: # manual trigger
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update project status
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // Repos to track (add/remove as needed)
            const tracked = [
              { owner: 'cred-ninja', repo: 'sdk', label: 'Cred SDK' },
              { owner: 'kilroycreative', repo: 'deep-loop', label: 'deep-loop' },
              { owner: 'kilroycreative', repo: 'openclaw', label: 'OpenClaw' },
            ];
            const rows = [];
            for (const t of tracked) {
              try {
                const { data: repo } = await github.rest.repos.get({
                  owner: t.owner, repo: t.repo
                });
                const pushed = new Date(repo.pushed_at);
                const daysAgo = Math.floor((Date.now() - pushed) / 86400000);
                const status = daysAgo <= 7 ? '🟢 Active' : daysAgo <= 30 ? '🟡 Recent' : '⚪ Paused';
                const stars = repo.stargazers_count;
                rows.push(`| ${t.label} | ${status} | ${daysAgo === 0 ? 'today' : daysAgo + 'd ago'} | ⭐ ${stars} |`);
              } catch {
                rows.push(`| ${t.label} | 🔒 Private | — | — |`);
              }
            }
            const table = [
              '| Project | Status | Last Push | Stars |',
              '|---------|--------|-----------|-------|',
              ...rows
            ].join('\\n');
            let readme = fs.readFileSync('README.md', 'utf8');
            // Replace content between markers
            const marker = /<!-- AUTOSTATUS:START -->[\\s\\S]*?<!-- AUTOSTATUS:END -->/;
            const replacement = `<!-- AUTOSTATUS:START -->\\n${table}\\n\\n<sub>Auto-updated daily via GitHub Actions</sub>\\n<!-- AUTOSTATUS:END -->`;
            if (marker.test(readme)) {
              readme = readme.replace(marker, replacement);
            }
            fs.writeFileSync('README.md', readme);
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add README.md && git commit -m "chore: auto-update project status" && git push)